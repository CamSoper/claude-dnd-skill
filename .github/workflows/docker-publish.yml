name: Publish claude-dnd image

# Builds and pushes the headless host image (docker/Dockerfile) to GHCR as
# ghcr.io/camsoper/claude-dnd. CamSoper/home-lab-iac (DndGame.cs) pulls :latest,
# so this must run (on merge to main, or via workflow_dispatch) before that
# stack's `pulumi up`.
on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'skills/**'
      - '.claude-plugin/**'
      - '.github/workflows/docker-publish.yml'
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/camsoper/claude-dnd
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
